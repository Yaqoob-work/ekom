<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; display: block; }
  </style>
</head>
<body>
  <video id="v" playsinline></video>
  <script>
    var v = document.getElementById('v');
    var timeTimer = null;

    function send(msg) {
      try { HlsChannel.postMessage(String(msg)); } catch(e) {}
    }

    send('debug:page_loaded');

    function clearPlayer() {
      if (timeTimer) { clearInterval(timeTimer); timeTimer = null; }
      v.pause();
      v.removeAttribute('src');
      v.load();
    }

    function doPlay() {
      var p = v.play();
      if (p !== undefined) {
        p.catch(function(e) {
          send('debug:unmuted_blocked:' + (e ? e.message : 'unknown'));
          v.muted = true;
          v.play().then(function() {
            send('debug:muted_play_ok');
            setTimeout(function() { v.muted = false; }, 300);
          }).catch(function(e2) {
            send('error:play_failed:' + (e2 ? e2.message : 'unknown'));
          });
        });
      }
    }

    function loadStream(encodedUrl) {
      var url = decodeURIComponent(encodedUrl);
      send('debug:loadStream:' + url.substring(0, 80));
      clearPlayer();
      v.src = url;
      doPlay();
      timeTimer = setInterval(function() {
        if (!v.paused && !isNaN(v.duration) && v.duration > 0) {
          send('time:' + Math.floor(v.currentTime * 1000) + ':' + Math.floor(v.duration * 1000));
        }
      }, 500);
    }

    v.addEventListener('canplay', function() { send('ready:'); });
    v.addEventListener('playing', function() { send('play'); });
    v.addEventListener('pause', function() { send('pause'); });
    v.addEventListener('error', function() {
      var err = v.error;
      var code = err ? err.code : 0;
      var msg2 = err ? err.message : 'unknown';
      send('error:video_err:code=' + code + ':' + msg2);
    });

    function play()        { doPlay(); }
    function pause()       { v.pause(); }
    function seekTo(sec)   { v.currentTime = sec; }
    function setMuted(val) { v.muted = (val === 'true' || val === true); }
  </script>
</body>
</html>
