plugins {
    id 'org.jetbrains.kotlin.android' version '2.1.0'
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "27"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0.27"
}

android {
    namespace = "com.example.mobi_tv_entertainment"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }


    kotlinOptions {
        jvmTarget = '17'
    }

    // signingConfigs {
    //     release {
    //         keyAlias 'ekamflix'
    //         keyPassword 'ekamflix'
    //         storeFile file('ekamflix-keystore.jks')
    //         storePassword 'ekamflix'
    //     }
    // }
     signingConfigs {
         release {
             keyAlias 'getplayboxtv'
             keyPassword 'getplayboxtv'
             storeFile file('get-play-box-tv-key.jks')
             storePassword 'getplayboxtv'
         }
     }

     packagingOptions {
       // Fixes duplicate libraries build issue, 
       // when your project uses more than one plugin that depend on C++ libs.
        pickFirst 'lib/**/libc++_shared.so'
    }
   


    defaultConfig {
        applicationId "com.getplaybox.tvapp"
        minSdkVersion flutter.minSdkVersion        // Android 5.0+ — Fire TV Gen 1 tak sab cover
        targetSdkVersion 34     // Android 14 — stable, widely tested
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        ndk {
            // arm64-v8a  — Fire TV Stick 4K, modern phones, Android TV boxes
            // armeabi-v7a — purane Fire TV Stick (1st/2nd gen), 32-bit boxes
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }

        // += zaroori hai — "=" Flutter ke auto-injected ${applicationName}
        // placeholder ko delete kar deta hai aur build fail ho jaata hai.
        manifestPlaceholders += [leanbackRequired: "false"]
    }

    // "sideload" flavor — direct APK ke liye (TV + phones + sabhi devices)
    // "playstore" flavor — Play Store ke liye (sirf TV, listing protect rahegi)
    flavorDimensions "distribution"
    productFlavors {
        sideload {
            dimension "distribution"
            manifestPlaceholders += [leanbackRequired: "false"]
        }
        playstore {
            dimension "distribution"
            manifestPlaceholders += [leanbackRequired: "true"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'),
                    'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}




